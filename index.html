<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kopple</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#14181A;
    --panel:#1C2224;
    --panel-2:#222A2C;
    --ink:#ECE8DE;
    --muted:#7C8386;
    --accent:#1a365d; 
    --accent-ink:#ECE8DE;
    --accent-2: var(--accent);
    --line: rgba(236,232,222,0.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background-color:var(--bg);
    color:var(--ink);
    font-family:'JetBrains Mono', monospace;
    min-height:100vh;
    overflow-x: hidden;
  }
  h1,h2,h3,.display{
    font-family:'Oswald', sans-serif;
    text-transform:uppercase;
    letter-spacing:0.03em;
    margin:0;
  }
  .wrap{max-width:720px;margin:0 auto; padding: 20px 16px 120px;}
  .icon{width:20px; height:20px; display:block;}

  /* ---------- ANIMAÇÕES ---------- */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulseRunner {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.1); opacity: 1; fill: var(--accent-2); }
  }
  @keyframes liftWeight {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  @keyframes fillBottle {
    0% { height: 10%; }
    100% { height: 100%; }
  }

  .animated-fade {
    animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  /* ---------- CARREGAMENTO ---------- */
  .loader-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: var(--bg);
    color: var(--ink);
    text-align: center;
  }
  .runner-icon {
    width: 80px;
    height: 80px;
    animation: pulseRunner 1.2s infinite ease-in-out;
    fill: var(--ink);
    margin-bottom: 20px;
  }

  /* ---------- ANIMAÇÃO DE CÁLCULO ---------- */
  .calc-loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
    background: var(--panel-2);
    border: 1px dashed var(--accent);
    margin-bottom: 16px;
    border-radius: 4px;
    animation: fadeInUp 0.3s ease;
  }
  .calc-anim-icons {
    display: flex;
    gap: 30px;
    margin-bottom: 15px;
    align-items: flex-end;
  }
  .anim-weight {
    width: 40px;
    height: 40px;
    fill: var(--accent-2);
    animation: liftWeight 0.8s infinite ease-in-out;
  }
  .anim-bottle-container {
    width: 20px;
    height: 40px;
    border: 2px solid var(--ink);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }
  .anim-bottle-fill {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #3182ce;
    animation: fillBottle 1.5s infinite ease-in-out;
  }

  /* ---------- LOGIN RÁPIDO ---------- */
  .loginWrap{max-width:420px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; justify-content:center; padding:24px;}
  .loginTitle{text-align:center; margin-bottom:6px; font-size:36px; font-weight: 700; letter-spacing: 0.1em;}
  .loginTitle span{color:var(--accent-2);}
  .loginSub{text-align:center; color:var(--muted); font-size:11px; letter-spacing:0.15em; margin-bottom:30px;}
  
  .lockerBig{
    background:var(--panel); border:1px solid var(--line); border-top:4px solid var(--muted);
    padding:28px 18px; margin-bottom:16px; cursor:pointer; 
    transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    display: flex; flex-direction: column; align-items: center; text-align: center;
    border-radius: 6px;
  }
  .lockerBig:hover{
    transform: translateY(-4px);
    border-top-color:var(--accent);
    background: var(--panel-2);
  }
  .lockerBig .name{font-family:'Oswald',sans-serif; font-size:28px; font-weight:700; text-transform: uppercase;}
  .lockerBig .hint{font-size:11px; color:var(--muted); margin-top:8px;}

  /* ---------- CONTROLES ---------- */
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px;}
  .color-picker-wrap { display: flex; align-items: center; gap: 10px; }
  .color-picker-wrap input[type="color"] { width: 50px; height: 38px; padding: 0; cursor: pointer; border: 1px solid var(--line); }
  input, select, textarea{
    width:100%; background:var(--bg); border:1px solid var(--line); color:var(--ink);
    padding:9px 10px; font-family:'JetBrains Mono',monospace; font-size:14px;
  }
  textarea{resize:vertical; min-height:64px;}
  input:focus, select:focus, textarea:focus{outline:1px solid var(--accent); border-color:var(--accent);}
  .btn{
    background:var(--accent); color:var(--accent-ink); border:none; padding:11px 16px; font-family:'Oswald',sans-serif;
    text-transform:uppercase; font-weight:600; letter-spacing:0.05em; cursor:pointer; font-size:13px;
    display: inline-block; text-align: center; text-decoration: none;
    border-radius: 4px;
  }
  .btn:hover{filter:brightness(1.2);}
  .btn.ghost{background:transparent; color:var(--ink); border:1px solid var(--line);}
  .btn.ghost:hover{border-color:var(--accent); color:var(--accent);}
  .btn.small{padding:7px 10px; font-size:11px;}
  .btnRow{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
  .rowGrid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .panel{background:var(--panel); border:1px solid var(--line); padding:20px; margin-bottom:16px; border-radius: 4px;}
  .tear{border:none; border-top:1px dashed var(--line); margin:20px 0;}
  .empty{color:var(--muted); font-size:12px; padding:16px 0; text-align:center;}
  .iconBtn{background:none; border:none; color:var(--muted); cursor:pointer; font-size:15px; padding:2px 6px;}
  .iconBtn:hover{color:var(--accent);}
  .hint{font-size:11px; color:var(--muted); margin-top:8px; line-height:1.5;}
  .toast{position:fixed; bottom:88px; left:50%; transform:translateX(-50%); background:var(--panel-2); border:1px solid var(--accent); color:var(--ink); padding:9px 16px; font-size:12px; opacity:0; transition:opacity .25s; pointer-events:none; z-index:99; border-radius: 4px;}
  .toast.show{opacity:1;}

  /* ---------- TOP HEADER ---------- */
  .topbar{display:flex; align-items:center; justify-content:space-between; padding-bottom:16px; margin-bottom:16px; border-bottom:1px solid var(--line);}
  .topbar .left{display:flex; align-items:center; gap:10px;}
  .avatar{
    width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-family:'Oswald',sans-serif; font-weight:700; font-size:15px; cursor:pointer; border:none; flex-shrink:0;
    color: #fff !important;
  }
  .wordmark{font-size:20px; font-family:'Oswald', sans-serif; font-weight:700; letter-spacing:0.06em;}
  .wordmark span{color:var(--accent-2);}
  .menuBtn{background:none; border:1px solid var(--line); color:var(--muted); font-size:11px; padding:6px 10px; cursor:pointer; font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:.05em; border-radius: 4px;}
  .menuBtn:hover{color:var(--accent); border-color:var(--accent);}
  .menuPanel{position:fixed; top:0; right:0; bottom:0; width:280px; background:var(--panel); border-left:1px solid var(--line); z-index:70; padding:20px; transform:translateX(100%); transition:transform .2s;}
  .menuPanel.open{transform:translateX(0);}
  .menuOverlay{position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:65; opacity:0; pointer-events:none; transition:opacity .2s;}
  .menuOverlay.open{opacity:1; pointer-events:auto;}
  .menuPanel h3{font-size:14px; margin-bottom:16px;}
  .menuItem{padding:11px 0; border-bottom:1px solid var(--line); font-size:12.5px; cursor:pointer; color:var(--ink);}
  .menuItem:hover{color:var(--accent);}
  .menuItem.danger:hover{color:#ff6b6b;}

  /* ---------- BOTTOM NAV ---------- */
  .bottomNav{
    position:fixed; bottom:0; left:0; right:0; background:var(--panel); border-top:1px solid var(--line);
    display:flex; justify-content:center; z-index:40;
  }
  .bottomNavInner{max-width:720px; width:100%; display:flex;}
  .navBtn{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:10px 4px 8px;
    background:none; border:none; cursor:pointer; color:var(--muted);
    font-family:'Oswald',sans-serif; text-transform:uppercase; font-size:9.5px; letter-spacing:0.04em;
  }
  .navBtn.active{color:var(--accent-2);}
  .navBtn .icon{margin:0 auto;}

  /* ---------- SURPRESA DIÁRIA ---------- */
  .surprise-box {
    background: linear-gradient(135deg, var(--panel-2), #2d3748);
    border: 1px solid var(--accent-2);
    border-radius: 6px;
    padding: 16px;
    margin-bottom: 16px;
    text-align: center;
    animation: fadeInUp 0.5s ease;
  }
  .surprise-title {
    font-family: 'Oswald', sans-serif;
    color: var(--accent-2);
    font-size: 16px;
    margin-bottom: 8px;
  }

  /* ---------- PLATES ---------- */
  .plates{display:flex; gap:14px; flex-wrap:wrap; margin-top:18px;}
  .plate{
    flex:1; min-width:140px; border:2px solid var(--line); border-radius:50%; aspect-ratio:1;
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
    background: radial-gradient(circle at 35% 30%, var(--panel-2), var(--panel) 70%);
  }
  .plate .val{font-family:'Oswald',sans-serif; font-size:26px; font-weight:700;}
  .plate .lbl{font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-top:4px; padding:0 10px;}
  .plate.accent{border-color:var(--accent);}
  .plate.accent .val{color:var(--accent);}
  .plate.accent2{border-color:var(--accent-2);}
  .plate.accent2 .val{color:var(--accent-2);}

  /* ---------- LISTAS E TREINOS ---------- */
  .ledger{border-top:1px solid var(--line);}
  .ledgerRow{
    display:grid; grid-template-columns: 1fr auto; gap:10px; align-items:center;
    padding:11px 2px; border-bottom:1px solid var(--line); font-size:13px;
  }
  .ledgerRow .meta{color:var(--muted); font-size:11px;}
  .exRow{display:grid; grid-template-columns:auto 2fr 1fr 1fr 1fr auto; gap:8px; align-items:center; padding:8px 2px; border-bottom:1px solid var(--line); font-size:12.5px;}
  .exRow .h{color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:.06em;}
  .exRow input[type=checkbox]{width:16px; accent-color:var(--accent-2);}
  .exRow.done{opacity:0.55;}
  .exRow.done .exName{text-decoration:line-through; color:var(--muted);}
  .dayCard{margin-bottom:16px; border:1px solid var(--line); border-radius: 4px; overflow: hidden;}
  .dayHead{display:flex; justify-content:space-between; align-items:center; padding:12px 14px; background:var(--panel-2); gap:10px;}
  .dayHead h3{font-size:15px;}
  .dayBody{padding:12px 14px;}

  /* ---------- WEEK STRIP ---------- */
  .weekStrip{display:flex; justify-content:space-between; gap:6px; margin-bottom:18px;}
  .dayDot{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer;}
  .dayDot .lbl{font-size:9px; color:var(--muted); text-transform:uppercase;}
  .dayDot .circ{
    width:32px; height:32px; border-radius:50%; border:1.5px solid var(--line); display:flex; align-items:center; justify-content:center;
    font-family:'Oswald',sans-serif; font-size:12px; color:var(--muted);
  }
  .dayDot.done .circ{background:var(--accent-2); border-color:var(--accent-2); color:#14181A;}
  .dayDot.today .circ{border-color:var(--accent-2);}

  /* ---------- CRONÔMETRO FLUTUANTE ---------- */
  .timerBar{
    position:fixed; bottom:64px; left:0; right:0; background:var(--panel-2); border-top:1px solid var(--accent);
    padding:8px 16px; display:flex; align-items:center; justify-content:space-between; z-index:35;
    font-family:'JetBrains Mono',monospace; font-size:13px;
  }
  .timerBar .time{font-size:18px; font-weight:700; color:var(--accent-2);}
  .timerBar .timerBtnRow{display:flex; gap:6px;}

  /* ---------- SEÇÃO DE ÁGUA ---------- */
  .waterWidget { display: flex; align-items: center; justify-content: space-between; gap: 15px; }
  .waterProgress { flex: 1; height: 12px; background: var(--bg); border: 1px solid var(--line); border-radius: 6px; overflow: hidden; position: relative;}
  .waterBar { height: 100%; background: #3182ce; transition: width 0.3s; }

  /* ---------- HABITOS/METAS ---------- */
  .metaRow { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line); }
  .metaRow input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
  .metaRow.done span { text-decoration: line-through; color: var(--muted); }
  .progressBar { height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; margin: 10px 0; }
  .progressBarInner { height: 100%; background: var(--accent-2); width: 0%; transition: width 0.3s; }

  /* ---------- NOVO: GRÁFICO CSS ---------- */
  .chart { display: flex; align-items: flex-end; justify-content: space-between; height: 120px; gap: 6px; margin: 16px 0; border-bottom: 1px solid var(--line); padding-bottom: 4px; }
  .chart-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; }
  .chart-bar { width: 100%; background: var(--accent-2); border-radius: 2px 2px 0 0; transition: height 0.3s ease; min-height: 4px; max-width: 24px; }
  .chart-val { font-size: 9px; margin-bottom: 4px; color: var(--ink); }
  
  @media (max-width:480px){
    .rowGrid{grid-template-columns:1fr;}
    .exRow{grid-template-columns:auto 1.6fr 1fr 1fr 1fr auto;}
  }
</style>
</head>

async function safeGet(key, shared){
  try{ const r = await window.storage.get(key, shared); return r ? JSON.parse(r.value) : null; }
  catch(e){ return null; }
}
async function safeSet(key, value, shared){
  try{ const r = await window.storage.set(key, JSON.stringify(value), shared); if(!r) toast('Não foi possível salvar agora.'); return r; }
  catch(e){ toast('Erro ao salvar.'); return null; }
}

function startTimer(seconds) {
  if (timerInterval) clearInterval(timerInterval);
  timerTimeLeft = seconds;
  timerRunning = true;
  updateTimerUI();
  
  timerInterval = setInterval(() => {
    if (timerTimeLeft > 0) {
      timerTimeLeft--;
      updateTimerUI();
    } else {
      clearInterval(timerInterval);
      timerRunning = false;
      document.getElementById('timerBeep').play();
      if(navigator.vibrate) navigator.vibrate([200, 100, 200]);
      toast("Tempo esgotado! Próxima série! 💪🔥");
      updateTimerUI();
    }
  }, 1000);
}

function toggleTimerRun() {
  if (!timerRunning && timerTimeLeft > 0) {
    timerRunning = true;
    startTimer(timerTimeLeft);
  } else {
    clearInterval(timerInterval);
    timerRunning = false;
    updateTimerUI();
  }
}

function stopTimer() {
  clearInterval(timerInterval);
  timerTimeLeft = 0;
  timerRunning = false;
  updateTimerUI();
}

function updateTimerUI() {
  const el = document.getElementById('timerContainer');
  if(!el) return;
  if(timerTimeLeft <= 0) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  const m = Math.floor(timerTimeLeft / 60);
  const s = timerTimeLeft % 60;
  document.getElementById('timerDisplay').textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  document.getElementById('timerPlayBtn').textContent = timerRunning ? 'PAUSAR' : 'RETOMAR';
}

function calcNutrition() {
  const p = state.perfilAtivo;
  const genero = document.getElementById('calc_genero').value;
  const peso = parseFloat(document.getElementById('calc_peso').value);
  const altura = parseFloat(document.getElementById('calc_altura').value);
  const idade = parseInt(document.getElementById('calc_idade').value);
  const atividade = parseFloat(document.getElementById('calc_atividade').value);
  const objetivo = document.getElementById('calc_objetivo').value;

  if(!peso || !altura || !idade) { toast("Por favor, preencha todos os campos do cálculo."); return; }

  state.calculando = true;
  render();

  setTimeout(() => {
    let tmb = genero === 'M' ? (88.362 + (13.397 * peso) + (4.799 * altura) - (5.677 * idade)) : (447.593 + (9.247 * peso) + (3.098 * altura) - (4.330 * idade));
    const get = tmb * atividade;
    let caloriasAlvo = get;

    if (objetivo === 'perda') caloriasAlvo -= 450;
    else if (objetivo === 'ganho') caloriasAlvo += 350;

    const proteinas = peso * 2;
    const gorduras = peso * 0.9;
    const carboidratos = (caloriasAlvo - (proteinas * 4) - (gorduras * 9)) / 4;

    state.calc[p] = {
      tmb: Math.round(tmb), get: Math.round(get), alvo: Math.round(caloriasAlvo),
      proteinas: Math.round(proteinas), gorduras: Math.round(gorduras), carboidratos: Math.round(carboidratos > 0 ? carboidratos : 0)
    };

    state.calculando = false;
    safeSet('calc:'+p, state.calc[p], true);
    toast("Plano calculado e salvo!");
    render();
  }, 1600);
}

      const bars = listRapida.slice(-10).map(log => {
        const hPct = range === 0 ? 50 : ((log.peso - minP) / range) * 100;
        return `
          <div class="chart-bar-wrap" title="${log.peso}kg em ${log.data}">
            <div class="chart-val">${log.peso}</div>
            <div class="chart-bar" style="height: ${hPct}%;"></div>
          </div>
        `;
      }).join('');
      chartHtml = `<div class="chart">${bars}</div>`;
    }

    let pesosLogHtml = listRapida.length ? listRapida.slice().reverse().map(log => `
      <div class="ledgerRow">
        <div><strong>${log.peso} kg</strong> <span class="meta">${log.data}</span></div>
      </div>
    `).join('') : '<div class="empty">Nenhum peso registrado ainda.</div>';

    let medidasLogHtml = listDetalhada.length ? listDetalhada.slice().reverse().map(log => `
      <div class="ledgerRow" style="font-size:12px;">
        <div>
          <strong>${log.data}</strong><br>
          <span style="color:var(--muted)">Bíc: ${log.bEsquerdo}/${log.bDireito}cm | Coxa: ${log.coxaEsq}/${log.coxaDir}cm | Abd: ${log.abdomen}cm</span>
        </div>
      </div>
    `).join('') : '<div class="empty">Nenhuma medida corporal registrada.</div>';

    return `
      <div class="animated-fade">
        <div class="panel">
          <h3>Evolução Corporal</h3>
          <p class="hint">Acompanhe seu progresso ao longo do tempo. Digite seu peso ou suas medidas para registrar no seu perfil.</p>
          
          <div class="tear"></div>
          
          <h4 style="font-family:'Oswald',sans-serif; margin-bottom:10px;">Progresso de Peso Rápido</h4>
          <div class="rowGrid">
            <div class="field">
              <label>Peso Corporal (kg)</label>
              <input type="number" step="0.1" id="ev_rap_peso" placeholder="Ex: 75.5">
            </div>
            <div class="field" style="display:flex; align-items:flex-end;">
              <button class="btn" style="width:100%;" onclick="addEvRapida()">Registrar Peso</button>
            </div>
          </div>
          
          ${chartHtml}

          <div class="ledger" style="margin-top:14px; max-height:180px; overflow-y:auto;">
            ${pesosLogHtml}
          </div>
          ${listRapida.length ? `<button class="btn small ghost" style="margin-top:8px; width:100%;" onclick="cleanEvolutionData('rapida')">Limpar Histórico</button>` : ''}
          
          <div class="tear"></div>

          <h4 style="font-family:'Oswald',sans-serif; margin-bottom:10px;">Medidas Corporais Detalhadas</h4>
          <div class="rowGrid">
            <div class="field"><label>Bíceps Esq (cm)</label><input type="number" step="0.1" id="det_b_esq"></div>
            <div class="field"><label>Bíceps Dir (cm)</label><input type="number" step="0.1" id="det_b_dir"></div>
            <div class="field"><label>Abdomen (cm)</label><input type="number" step="0.1" id="det_abdomen"></div>
            <div class="field"><label>Coxa Esq (cm)</label><input type="number" step="0.1" id="det_coxa_esq"></div>
            <div class="field"><label>Coxa Dir (cm)</label><input type="number" step="0.1" id="det_coxa_dir"></div>
            <div class="field" style="display:flex; align-items:flex-end;">
              <button class="btn" style="width:100%;" onclick="addEvDetalhada()">Registrar Medidas</button>
            </div>
          </div>
          <div class="ledger" style="margin-top:14px; max-height:180px; overflow-y:auto;">
            ${medidasLogHtml}
          </div>
          ${listDetalhada.length ? `<button class="btn small ghost" style="margin-top:8px; width:100%;" onclick="cleanEvolutionData('detalhada')">Limpar Medidas</button>` : ''}
        </div>
      </div>
    `;
  }

  if(state.tab === 'calc') {
    const calculated = state.calc[p];

    return `
      <div class="animated-fade">
        <div class="panel">
          <h3>Calculadora TMB & Macronutrientes</h3>
          <p class="hint">Calcule suas necessidades de forma individualizada com base no gasto calórico diário.</p>
          
          <div class="tear"></div>
          
          ${state.calculando ? `
            <div class="calc-loader">
              <div class="calc-anim-icons">
                <svg class="anim-weight" viewBox="0 0 24 24"><path d="M4 9v6M2 10.5v3M8 6v12M16 6v12M20 10.5v3M22 9v6M8 12h8"/></svg>
                <div class="anim-bottle-container"><div class="anim-bottle-fill"></div></div>
              </div>
              <div style="font-size:12px; font-weight:bold; color:var(--accent-2);">CALCULANDO METAS NUTRICIONAIS...</div>
            </div>
          ` : ''}

          <div class="rowGrid">
            <div class="field">
              <label>Gênero</label>
              <select id="calc_genero">
                <option value="M">Masculino</option>
                <option value="F">Feminino</option>
              </select>
            </div>
            <div class="field">
              <label>Idade (anos)</label>
              <input type="number" id="calc_idade" value="25">
            </div>
          </div>

          <div class="rowGrid">
            <div class="field">
              <label>Peso Atual (kg)</label>
              <input type="number" step="0.1" id="calc_peso" placeholder="Ex: 78">
            </div>
            <div class="field">
              <label>Altura (cm)</label>
              <input type="number" id="calc_altura" placeholder="Ex: 178">
            </div>
          </div>

          <div class="field">
            <label>Nível de Atividade</label>
            <select id="calc_atividade">
              <option value="1.2">Sedentário (pouco ou nenhum exercício)</option>
              <option value="1.375">Levemente ativo (exercício 1-3 dias/semana)</option>
              <option value="1.55">Moderadamente ativo (exercício 3-5 dias/semana)</option>
              <option value="1.725">Altamente ativo (exercício pesado 6-7 dias/semana)</option>
            </select>
          </div>

          <div class="field">
            <label>Objetivo</label>
            <select id="calc_objetivo">
              <option value="manter">Manter o Peso</option>
              <option value="perda">Perder Gordura (-450 kcal)</option>
              <option value="ganho">Massa Muscular (+350 kcal)</option>
            </select>
          </div>

          <button class="btn" style="width:100%; margin-top:10px;" onclick="calcNutrition()">Calcular Plano Alimentar</button>
        </div>

        ${calculated ? `
          <div class="panel animated-fade" style="border-top:3px solid var(--accent-2);">
            <h3 style="color:var(--accent-2);">Seu Plano Nutricional</h3>
            
            <div class="plates">
              <div class="plate accent">
                <div class="val">${calculated.tmb}</div>
                <div class="lbl">TMB (kcal)</div>
              </div>
              <div class="plate accent2">
                <div class="val">${calculated.get}</div>
                <div class="lbl">Gasto Diário</div>
              </div>
              <div class="plate" style="border-color:#3182ce;">
                <div class="val" style="color:#3182ce;">${calculated.alvo}</div>
                <div class="lbl">Alvo Diário</div>
              </div>
            </div>

            <div class="tear"></div>

            <div style="font-size:13px; line-height:1.6;">
              <div style="display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--line);">
                <span>🥩 Proteínas</span><strong>${calculated.proteinas}g <span style="font-size:11px; color:var(--muted)">(${calculated.proteinas * 4} kcal)</span></strong>
              </div>
              <div style="display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--line);">
                <span>🍠 Carboidratos</span><strong>${calculated.carboidratos}g <span style="font-size:11px; color:var(--muted)">(${calculated.carboidratos * 4} kcal)</span></strong>
              </div>
              <div style="display:flex; justify-content:space-between; padding:6px 0;">
                <span>🥑 Gorduras</span><strong>${calculated.gorduras}g <span style="font-size:11px; color:var(--muted)">(${calculated.gorduras * 9} kcal)</span></strong>
              </div>
            </div>
          </div>
        ` : ''}
      </div>
    `;
  }

  if(state.tab === 'mural') {
    const metasHtml = state.metas.map(meta => `
      <div class="metaRow ${meta.concluida ? 'done' : ''}">
        <input type="checkbox" ${meta.concluida ? 'checked' : ''} onchange="toggleMeta('${meta.id}', this.checked)">
        <span>${meta.texto}</span>
      </div>
    `).join('');

    const concluidas = state.metas.filter(m => m.concluida).length;
    const totalMetas = state.metas.length;
    const pct = Math.round((concluidas / totalMetas) * 100);

    return `
      <div class="animated-fade">
        <div class="panel">
          <h3>🏆 Metas Semanais do Casal</h3>
          <div class="progressBar">
            <div class="progressBarInner" style="width: ${pct}%"></div>
          </div>
          <div style="font-size:11px; color:var(--muted); text-align:right; margin-bottom:12px;">${concluidas}/${totalMetas} Concluídas (${pct}%)</div>
          ${metasHtml}
        </div>

        <div class="panel">
          <h3>📸 Mural Compartilhado</h3>
          <p class="hint">Envie fotos e registre mensagens para manter a chama e a motivação do casal no topo!</p>
          <div class="empty">Em breve, você poderá sincronizar fotos em tempo real com o servidor! 🤩</div>
        </div>
      </div>
    `;
  }
  return '';
}

function render() {
  const app = document.getElementById('app');
  if(!state.loaded) return;

  if(!state.session) {
    app.innerHTML = renderLogin();
    return;
  }

  const p = state.perfilAtivo;

  app.innerHTML = `
    <div class="wrap">
      <div class="topbar">
        <div class="left">
          <button class="avatar" style="background:${state.perfis[p].cor}" onclick="toggleMenu()">${state.perfis[p].nome.slice(0,2)}</button>
          <div class="wordmark">Kopple<span>.</span></div>
        </div>
        <div>
          <button class="menuBtn" onclick="toggleMenu()">Configurações ⚙️</button>
        </div>
      </div>

      <div class="menuOverlay ${state.menuOpen ? 'open' : ''}" onclick="toggleMenu()"></div>
      <div class="menuPanel ${state.menuOpen ? 'open' : ''}">
        <h3>Opções do Kopple</h3>
        <div class="menuItem" onclick="exportToExcel()">📥 Backup para Excel</div>
        <div class="menuItem" onclick="changeTab('treinos')">💪 Visualizar Treinos</div>
        <div class="menuItem" onclick="changeTab('progresso')">📈 Histórico de Evolução</div>
        <div class="menuItem" onclick="changeTab('calc')">🍎 TMB & Nutrição</div>
        <div class="menuItem" onclick="changeTab('mural')">🏆 Metas e Mural</div>
        
        <div class="tear"></div>
        <div class="field">
          <label>Mudar cor do perfil</label>
          <div class="color-picker-wrap">
            <input type="color" value="${state.perfis[p].cor}" onchange="updateColor('${p}', this.value)">
          </div>
        </div>

        <div class="menuItem danger" onclick="logout()" style="margin-top:20px;">🚪 Mudar de Perfil (Sair)</div>
      </div>

      <div id="contentArea">${renderContent()}</div>

      <div class="bottomNav">
        <div class="bottomNavInner">
          <button class="navBtn ${state.tab === 'treinos' ? 'active' : ''}" onclick="changeTab('treinos')">
            ${ICONS.treinos}
            <span>Treino</span>
          </button>
          <button class="navBtn ${state.tab === 'progresso' ? 'active' : ''}" onclick="changeTab('progresso')">
            ${ICONS.progresso}
            <span>Evolução</span>
          </button>
          <button class="navBtn ${state.tab === 'calc' ? 'active' : ''}" onclick="changeTab('calc')">
            ${ICONS.calc}
            <span>Nutrição</span>
          </button>
          <button class="navBtn ${state.tab === 'mural' ? 'active' : ''}" onclick="changeTab('mural')">
            ${ICONS.mural}
            <span>Mural</span>
          </button>
        </div>
      </div>

      <div class="timerBar" id="timerContainer" style="display:none;">
        <div>Tempo de descanso: <span class="time" id="timerDisplay">01:30</span></div>
        <div class="timerBtnRow">
          <button class="btn small" id="timerPlayBtn" onclick="toggleTimerRun()">PAUSAR</button>
          <button class="btn small ghost" onclick="stopTimer()">FECHAR</button>
        </div>
      </div>
    </div>
  `;

  updateTimerUI();
}

function toggleMenu() {
  state.menuOpen = !state.menuOpen;
  render();
}

window.onload = loadAll;
</script>
</body>
</html>
