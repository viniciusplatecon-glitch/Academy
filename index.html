<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kopple</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#14181A;
    --panel:#1C2224;
    --panel-2:#222A2C;
    --ink:#ECE8DE;
    --muted:#7C8386;
    --accent:#1a365d; 
    --accent-ink:#ECE8DE;
    --accent-2:#8FBF3F;
    --line: rgba(236,232,222,0.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background-color:var(--bg);
    color:var(--ink);
    font-family:'JetBrains Mono', monospace;
    min-height:100vh;
    overflow-x: hidden;
  }
  h1,h2,h3,.display{
    font-family:'Oswald', sans-serif;
    text-transform:uppercase;
    letter-spacing:0.03em;
    margin:0;
  }
  .wrap{max-width:720px;margin:0 auto; padding: 20px 16px 120px;}
  .icon{width:20px; height:20px; display:block;}

  /* ---------- ANIMAÇÕES ---------- */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(15px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulseRunner {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.1); opacity: 1; fill: var(--accent-2); }
  }
  @keyframes liftWeight {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  @keyframes fillBottle {
    0% { height: 10%; }
    100% { height: 100%; }
  }

  .animated-fade {
    animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
  }

  /* ---------- CARREGAMENTO ---------- */
  .loader-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: var(--bg);
    color: var(--ink);
    text-align: center;
  }
  .runner-icon {
    width: 80px;
    height: 80px;
    animation: pulseRunner 1.2s infinite ease-in-out;
    fill: var(--ink);
    margin-bottom: 20px;
  }

  /* ---------- ANIMAÇÃO DE CÁLCULO ---------- */
  .calc-loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
    background: var(--panel-2);
    border: 1px dashed var(--accent);
    margin-bottom: 16px;
    border-radius: 4px;
    animation: fadeInUp 0.3s ease;
  }
  .calc-anim-icons {
    display: flex;
    gap: 30px;
    margin-bottom: 15px;
    align-items: flex-end;
  }
  .anim-weight {
    width: 40px;
    height: 40px;
    fill: var(--accent-2);
    animation: liftWeight 0.8s infinite ease-in-out;
  }
  .anim-bottle-container {
    width: 20px;
    height: 40px;
    border: 2px solid var(--ink);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }
  .anim-bottle-fill {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #3182ce;
    animation: fillBottle 1.5s infinite ease-in-out;
  }

  /* ---------- LOGIN RÁPIDO ---------- */
  .loginWrap{max-width:420px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; justify-content:center; padding:24px;}
  .loginTitle{text-align:center; margin-bottom:6px; font-size:36px; font-weight: 700; letter-spacing: 0.1em;}
  .loginTitle span{color:var(--accent-2);}
  .loginSub{text-align:center; color:var(--muted); font-size:11px; letter-spacing:0.15em; margin-bottom:30px;}
  
  .lockerBig{
    background:var(--panel); border:1px solid var(--line); border-top:4px solid var(--muted);
    padding:28px 18px; margin-bottom:16px; cursor:pointer; 
    transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    display: flex; flex-direction: column; align-items: center; text-align: center;
    border-radius: 6px;
  }
  .lockerBig:hover{
    transform: translateY(-4px);
    border-top-color:var(--accent);
    background: var(--panel-2);
  }
  .lockerBig .name{font-family:'Oswald',sans-serif; font-size:28px; font-weight:700; text-transform: uppercase;}
  .lockerBig .hint{font-size:11px; color:var(--muted); margin-top:8px;}

  /* ---------- CONTROLES ---------- */
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px;}
  .color-picker-wrap { display: flex; align-items: center; gap: 10px; }
  .color-picker-wrap input[type="color"] { width: 50px; height: 38px; padding: 0; cursor: pointer; border: 1px solid var(--line); }
  input, select, textarea{
    width:100%; background:var(--bg); border:1px solid var(--line); color:var(--ink);
    padding:9px 10px; font-family:'JetBrains Mono',monospace; font-size:14px;
  }
  textarea{resize:vertical; min-height:64px;}
  input:focus, select:focus, textarea:focus{outline:1px solid var(--accent); border-color:var(--accent);}
  .btn{
    background:var(--accent); color:var(--accent-ink); border:none; padding:11px 16px; font-family:'Oswald',sans-serif;
    text-transform:uppercase; font-weight:600; letter-spacing:0.05em; cursor:pointer; font-size:13px;
    display: inline-block; text-align: center; text-decoration: none;
  }
  .btn:hover{filter:brightness(1.2);}
  .btn.ghost{background:transparent; color:var(--ink); border:1px solid var(--line);}
  .btn.ghost:hover{border-color:var(--accent); color:var(--accent);}
  .btn.small{padding:7px 10px; font-size:11px;}
  .btnRow{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}
  .rowGrid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .panel{background:var(--panel); border:1px solid var(--line); padding:20px; margin-bottom:16px; border-radius: 4px;}
  .tear{border:none; border-top:1px dashed var(--line); margin:20px 0;}
  .empty{color:var(--muted); font-size:12px; padding:16px 0; text-align:center;}
  .iconBtn{background:none; border:none; color:var(--muted); cursor:pointer; font-size:15px; padding:2px 6px;}
  .iconBtn:hover{color:var(--accent);}
  .hint{font-size:11px; color:var(--muted); margin-top:8px; line-height:1.5;}
  .toast{position:fixed; bottom:88px; left:50%; transform:translateX(-50%); background:var(--panel-2); border:1px solid var(--accent); color:var(--ink); padding:9px 16px; font-size:12px; opacity:0; transition:opacity .25s; pointer-events:none; z-index:99;}
  .toast.show{opacity:1;}

  /* ---------- TOP HEADER ---------- */
  .topbar{display:flex; align-items:center; justify-content:space-between; padding-bottom:16px; margin-bottom:16px; border-bottom:1px solid var(--line);}
  .topbar .left{display:flex; align-items:center; gap:10px;}
  .avatar{
    width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-family:'Oswald',sans-serif; font-weight:700; font-size:15px; cursor:pointer; border:none; flex-shrink:0;
    color: #fff !important;
  }
  .avatarSmall{width:30px; height:30px; font-size:12px;}
  .wordmark{font-size:20px; font-family:'Oswald', sans-serif; font-weight:700; letter-spacing:0.06em;}
  .wordmark span{color:var(--accent-2);}
  .menuBtn{background:none; border:1px solid var(--line); color:var(--muted); font-size:11px; padding:6px 10px; cursor:pointer; font-family:'Oswald',sans-serif; text-transform:uppercase; letter-spacing:.05em;}
  .menuBtn:hover{color:var(--accent); border-color:var(--accent);}
  .menuPanel{position:fixed; top:0; right:0; bottom:0; width:280px; background:var(--panel); border-left:1px solid var(--line); z-index:70; padding:20px; transform:translateX(100%); transition:transform .2s;}
  .menuPanel.open{transform:translateX(0);}
  .menuOverlay{position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:65; opacity:0; pointer-events:none; transition:opacity .2s;}
  .menuOverlay.open{opacity:1; pointer-events:auto;}
  .menuPanel h3{font-size:14px; margin-bottom:16px;}
  .menuItem{padding:11px 0; border-bottom:1px solid var(--line); font-size:12.5px; cursor:pointer; color:var(--ink);}
  .menuItem:hover{color:var(--accent);}
  .menuItem.danger:hover{color:#ff6b6b;}

  /* ---------- BOTTOM NAV ---------- */
  .bottomNav{
    position:fixed; bottom:0; left:0; right:0; background:var(--panel); border-top:1px solid var(--line);
    display:flex; justify-content:center; z-index:40;
  }
  .bottomNavInner{max-width:720px; width:100%; display:flex;}
  .navBtn{
    flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; padding:10px 4px 8px;
    background:none; border:none; cursor:pointer; color:var(--muted);
    font-family:'Oswald',sans-serif; text-transform:uppercase; font-size:9.5px; letter-spacing:0.04em;
  }
  .navBtn.active{color:var(--accent-2);}
  .navBtn .icon{margin:0 auto;}

  /* ---------- SURPRESA DIÁRIA ---------- */
  .surprise-box {
    background: linear-gradient(135deg, var(--panel-2), #2d3748);
    border: 1px solid var(--accent-2);
    border-radius: 6px;
    padding: 16px;
    margin-bottom: 16px;
    text-align: center;
    animation: fadeInUp 0.5s ease;
  }
  .surprise-title {
    font-family: 'Oswald', sans-serif;
    color: var(--accent-2);
    font-size: 16px;
    margin-bottom: 8px;
  }

  /* ---------- PLATES ---------- */
  .plates{display:flex; gap:14px; flex-wrap:wrap; margin-top:18px;}
  .plate{
    flex:1; min-width:140px; border:2px solid var(--line); border-radius:50%; aspect-ratio:1;
    display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;
    background: radial-gradient(circle at 35% 30%, var(--panel-2), var(--panel) 70%);
  }
  .plate .val{font-family:'Oswald',sans-serif; font-size:26px; font-weight:700;}
  .plate .lbl{font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-top:4px; padding:0 10px;}
  .plate.accent{border-color:var(--accent);}
  .plate.accent .val{color:var(--accent);}
  .plate.accent2{border-color:var(--accent-2);}
  .plate.accent2 .val{color:var(--accent-2);}

  /* ---------- LISTAS E TREINOS ---------- */
  .ledger{border-top:1px solid var(--line);}
  .ledgerRow{
    display:grid; grid-template-columns: 1fr auto; gap:10px; align-items:center;
    padding:11px 2px; border-bottom:1px solid var(--line); font-size:13px;
  }
  .ledgerRow .meta{color:var(--muted); font-size:11px;}
  .exRow{display:grid; grid-template-columns:auto 2fr 1fr 1fr 1fr auto; gap:8px; align-items:center; padding:8px 2px; border-bottom:1px solid var(--line); font-size:12.5px;}
  .exRow .h{color:var(--muted); font-size:10px; text-transform:uppercase; letter-spacing:.06em;}
  .exRow input[type=checkbox]{width:16px; accent-color:var(--accent-2);}
  .exRow.done{opacity:0.55;}
  .exRow.done .exName{text-decoration:line-through; color:var(--muted);}
  .dayCard{margin-bottom:16px; border:1px solid var(--line); border-radius: 4px; overflow: hidden;}
  .dayHead{display:flex; justify-content:space-between; align-items:center; padding:12px 14px; background:var(--panel-2); gap:10px;}
  .dayHead h3{font-size:15px;}
  .dayBody{padding:12px 14px;}

  /* ---------- WEEK STRIP ---------- */
  .weekStrip{display:flex; justify-content:space-between; gap:6px; margin-bottom:18px;}
  .dayDot{flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; cursor:pointer;}
  .dayDot .lbl{font-size:9px; color:var(--muted); text-transform:uppercase;}
  .dayDot .circ{
    width:32px; height:32px; border-radius:50%; border:1.5px solid var(--line); display:flex; align-items:center; justify-content:center;
    font-family:'Oswald',sans-serif; font-size:12px; color:var(--muted);
  }
  .dayDot.done .circ{background:var(--accent-2); border-color:var(--accent-2); color:#14181A;}
  .dayDot.today .circ{border-color:var(--accent-2);}

  .chartWrap{width:100%; overflow-x:auto;}

  /* ---------- CRONÔMETRO FLUTUANTE ---------- */
  .timerBar{
    position:fixed; bottom:64px; left:0; right:0; background:var(--panel-2); border-top:1px solid var(--accent);
    padding:8px 16px; display:flex; align-items:center; justify-content:space-between; z-index:35;
    font-family:'JetBrains Mono',monospace; font-size:13px;
  }
  .timerBar .time{font-size:18px; font-weight:700; color:var(--accent-2);}
  .timerBar .timerBtnRow{display:flex; gap:6px;}

  /* ---------- SEÇÃO DE ÁGUA ---------- */
  .waterWidget { display: flex; align-items: center; justify-content: space-between; gap: 15px; }
  .waterProgress { flex: 1; height: 12px; background: var(--bg); border: 1px solid var(--line); border-radius: 6px; overflow: hidden; position: relative;}
  .waterBar { height: 100%; background: #3182ce; transition: width 0.3s; }

  /* ---------- HABITOS/METAS ---------- */
  .metaRow { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line); }
  .metaRow input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; }
  .metaRow.done span { text-decoration: line-through; color: var(--muted); }
  .progressBar { height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; margin: 10px 0; }
  .progressBarInner { height: 100%; background: var(--accent-2); width: 0%; transition: width 0.3s; }

  /* ---------- MURAL DE POSTS ---------- */
  .postCard{background:var(--panel); border:1px solid var(--line); margin-bottom:14px; border-radius: 4px; overflow: hidden;}
  .postHead{display:flex; align-items:center; gap:10px; padding:12px 14px 8px;}
  .postHead .who{font-family:'Oswald',sans-serif; font-size:13px; text-transform:uppercase;}
  .postHead .when{font-size:10px; color:var(--muted);}
  .postText{padding:0 14px 10px; font-size:13.5px; line-height:1.5; white-space:pre-wrap;}
  .postImg{width:100%; display:block; max-height:420px; object-fit:cover; border-bottom: 1px solid var(--line);}
  .postFoot{display:flex; align-items:center; gap:10px; padding:8px 14px 12px; border-top: 1px solid var(--line); flex-wrap: wrap;}
  .likeBtn{background:none; border:1px solid var(--line); color:var(--muted); padding:6px 12px; font-size:12px; cursor:pointer; font-family:'JetBrains Mono',monospace;}
  .likeBtn.liked{border-color:var(--accent); color:var(--accent);}
  .composer textarea{margin-bottom:10px;}
  .fileRow{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
  .fileRow .fname{font-size:11px; color:var(--muted);}
  .previewImg{max-width:100%; max-height:160px; margin-bottom:10px; border:1px solid var(--line); display:none;}
  
  /* Comentários */
  .commentsSec { width: 100%; background: var(--panel-2); padding: 10px 14px; font-size: 12px; border-top: 1px solid var(--line); }
  .commentInputWrap { display: flex; gap: 8px; margin-top: 8px; }
  .commentInputWrap input { padding: 6px 10px; font-size: 12px; }
  .commentRow { margin-bottom: 6px; line-height: 1.4; }
  .commentRow strong { color: var(--accent); }

  @media (max-width:480px){
    .rowGrid{grid-template-columns:1fr;}
    .exRow{grid-template-columns:auto 1.6fr 1fr 1fr 1fr auto;}
  }
</style>
</head>

// Cronômetro State
let timerInterval = null;

if(!window.storage){
  window.storage = {
    get: async (key) => {
      const val = localStorage.getItem(key);
      return val ? { value: val } : null;
    },
    set: async (key, val) => {
      localStorage.setItem(key, val);
      return true;
    }
  };
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

async function safeGet(key, shared){
  try{ const r = await window.storage.get(key, shared); return r ? JSON.parse(r.value) : null; }
  catch(e){ return null; }
}
async function safeSet(key, value, shared){
  try{ const r = await window.storage.set(key, JSON.stringify(value), shared); if(!r) toast('Não foi possível salvar agora.'); return r; }
  catch(e){ toast('Erro ao salvar.'); return null; }
}

async function loadAll(){
  if(STORAGE_OK){
    const perfis = await safeGet('perfis', true); if(perfis) state.perfis = perfis;
    const mural = await safeGet('mural', true); if(mural) state.mural = mural;
    const metas = await safeGet('metas', true); if(metas) state.metas = metas;
    const water = await safeGet('water_daily', true); if(water) state.water = water;
    const waterMeta = await safeGet('water_meta', true); if(waterMeta) state.waterMeta = waterMeta;
    const evRapida = await safeGet('ev_rapida', true); if(evRapida) state.evolucaoRapida = evRapida;
    const evDetalhada = await safeGet('ev_detalhada', true); if(evDetalhada) state.evolucaoDetalhada = evDetalhada;

    for(const p of ['p1','p2']){
      const c = await safeGet('calc:'+p, true); if(c) state.calc[p] = c;
      const tr = await safeGet('treinos:'+p, true); if(tr) state.treinos[p] = tr;
      const tl = await safeGet('treinoLog:'+p, true); if(tl) state.treinoLog[p] = tl;
    }
  }
  setTimeout(() => {
    state.loaded = true;
    render();
  }, 1200);
}

/* ---------- CRONÔMETRO ---------- */
function startTimer(seconds) {
  if (timerInterval) clearInterval(timerInterval);
  timerTimeLeft = seconds;
  timerRunning = true;
  updateTimerUI();
  
  timerInterval = setInterval(() => {
    if (timerTimeLeft > 0) {
      timerTimeLeft--;
      updateTimerUI();
    } else {
      clearInterval(timerInterval);
      timerRunning = false;
      document.getElementById('timerBeep').play();
      if(navigator.vibrate) navigator.vibrate([200, 100, 200]);
      toast("Tempo esgotado! Próxima série! 💪🔥");
      updateTimerUI();
    }
  }, 1000);
}

function toggleTimerRun() {
  if (!timerRunning && timerTimeLeft > 0) {
    timerRunning = true;
    startTimer(timerTimeLeft);
  } else {
    clearInterval(timerInterval);
    timerRunning = false;
    updateTimerUI();
  }
}

function stopTimer() {
  clearInterval(timerInterval);
  timerTimeLeft = 0;
  timerRunning = false;
  updateTimerUI();
}

function updateTimerUI() {
  const el = document.getElementById('timerContainer');
  if(!el) return;
  if(timerTimeLeft <= 0) {
    el.style.display = 'none';
    return;
  }
  el.style.display = 'flex';
  const m = Math.floor(timerTimeLeft / 60);
  const s = timerTimeLeft % 60;
  document.getElementById('timerDisplay').textContent = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  document.getElementById('timerPlayBtn').textContent = timerRunning ? 'PAUSAR' : 'RETOMAR';
}

/* ---------- ÁGUA E SURPRESA DIÁRIA ---------- */
function getArredondado(valor) {
  // Arredonda para o copo cheio mais próximo (múltiplos de 50ml ou 250ml)
  return Math.round(valor / 50) * 50;
}

function addWater(amount){
  const p = state.perfilAtivo;
  state.water[p] = (state.water[p] || 0) + amount;
  safeSet('water_daily', state.water, true);
  
  if (state.water[p] >= state.waterMeta[p]) {
    toast("Incrível! Você bateu sua meta de água hoje! 🎉");
  }
  render();
}

function clearWater(){
  const p = state.perfilAtivo;
  state.water[p] = 0;
  safeSet('water_daily', state.water, true);
  render();
}

function getSurpresaDoDia() {
  const hoje = new Date();
  const diaDoAno = Math.floor((hoje - new Date(hoje.getFullYear(), 0, 0)) / 86400000);
  const indice = diaDoAno % SURPRESAS.length;
  return SURPRESAS[indice];
}

  const p = state.perfilAtivo;

/* ---------- TRATAMENTO DE EXCEL ---------- */
function handleImport(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(evt) {
    try {
      const data = evt.target.result;
      const workbook = XLSX.read(data, {type: 'binary'});
      const sheetName = workbook.SheetNames[0];
      const sheet = workbook.Sheets[sheetName];
      const rows = XLSX.utils.sheet_to_json(sheet);
      
      if(rows.length > 0) {
        // Converte as linhas do excel para estrutura de exercícios
        const exeEstruturado = rows.map((r, idx) => ({
          id: 'ex_xls_' + idx + '_' + Date.now().toString(36),
          nome: r.Nome || r.Exercicio || r.exercicio || 'Exercício Sem Nome',
          series: String(r.Series || r.Séries || 4),
          reps: String(r.Reps || r.Repetições || 10),
          carga: String(r.Carga || 0),
          feito: false
        }));
        
        const p = state.perfilAtivo;
        // Salva como uma nova lista customizada de treinos
        state.treinos[p] = [{
          id: 'custom_' + Date.now().toString(36),
          nome: "Treino Customizado (Excel)",
          exercicios: exeEstruturado
        }];
        safeSet('treinos:' + p, state.treinos[p], true);
        toast("Treino do Excel importado com sucesso! 📊");
        render();
      }
    } catch(err) {
      toast("Falha ao ler o Excel. Verifique a planilha.");
    }
  };
  reader.readAsBinaryString(file);
}

/* ---------- RENDER CENTRAL ---------- */
function getTreinoDoDia(perfil) {
  const hoje = new Date();
  const diaSemana = hoje.getDay(); // 0 = Domingo, 1 = Segunda, etc.
  
  let treinoId = '';
  if (perfil === 'p1') {
    treinoId = MAPA_DIAS_TREINO_VINI[diaSemana];
  } else {
    treinoId = MAPA_DIAS_TREINO_YAS[diaSemana];
  }
  
  return state.treinos[perfil].find(t => t.id === treinoId) || state.treinos[perfil][0];
}

          <button class="btn small" onclick="addWater(250)">+250ml</button>
          <button class="btn small" onclick="addWater(500)">+500ml</button>
          <button class="btn small ghost" onclick="clearWater()">Resetar</button>
        </div>
      </div>

      ${percentualAgua >= 100 ? `
        <div class="surprise-box">
          <div class="surprise-title">🌟 Surpresa diária liberada! 🌟</div>
          <div style="font-size: 13px; line-height:1.4;">"${getSurpresaDoDia()}"</div>
        </div>
      ` : ''}

      <div class="rowGrid">
        
        <div class="panel">
          <h3 style="font-size:14px; margin-bottom:10px;">Evolução Rápida</h3>
          <p class="hint">Acompanhamento simples e ágil.</p>
          <div class="field" style="margin-top: 10px;">
            <label>Peso atual (kg)</label>
            <div style="display:flex; gap:6px;">
              <input type="number" step="0.1" id="ev_rap_peso" placeholder="Ex: 75.5">
              <button class="btn" onclick="addEvRapida()">Salvar</button>
            </div>
          </div>
          <div style="max-height: 150px; overflow-y:auto; font-size:12px; margin-top:10px;">
            ${(state.evolucaoRapida[p] || []).length === 0 ? '<div class="empty">Sem registros rápidos ainda.</div>' : ''}
            ${(state.evolucaoRapida[p] || []).map(log => `
              <div style="display:flex; justify-content:space-between; padding: 6px 0; border-bottom:1px solid var(--line);">
                <span>${log.data}</span>
                <strong style="color:var(--accent-2);">${log.peso} kg</strong>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="panel">
          <h3 style="font-size:14px; margin-bottom:10px;">Evolução Mensal Detalhada</h3>
          <p class="hint">Medidas profundas de fita métrica/gordura.</p>
          <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-top: 10px;">
            <div class="field">
              <label>Braço (cm)</label>
              <input type="number" step="0.1" id="ev_det_braco" placeholder="Ex: 35">
            </div>
            <div class="field">
              <label>Cintura (cm)</label>
              <input type="number" step="0.1" id="ev_det_cintura" placeholder="Ex: 80">
            </div>
            <div class="field">
              <label>Coxa (cm)</label>
              <input type="number" step="0.1" id="ev_det_coxa" placeholder="Ex: 55">
            </div>
            <div class="field">
              <label>% Gordura (BF)</label>
              <input type="number" step="0.1" id="ev_det_bf" placeholder="Ex: 14">
            </div>
          </div>
          <button class="btn small" style="width:100%; margin-top:8px;" onclick="addEvDetalhada()">Salvar Medidas Mensais</button>
          
          <div style="max-height: 120px; overflow-y:auto; font-size:11px; margin-top:12px;">
            ${(state.evolucaoDetalhada[p] || []).length === 0 ? '<div class="empty">Sem medições detalhadas.</div>' : ''}
            ${(state.evolucaoDetalhada[p] || []).map(log => `
              <div style="padding: 6px 0; border-bottom:1px solid var(--line); line-height: 1.4;">
                <div style="display:flex; justify-content:space-between; font-weight:bold; margin-bottom:2px;">
                  <span>Medição ${log.data}</span>
                </div>
                <div style="color:var(--muted); display:flex; gap:10px;">
                  ${log.braco ? `<span>Braço: ${log.braco}cm</span>` : ''}
                  ${log.cintura ? `<span>Cintura: ${log.cintura}cm</span>` : ''}
                  ${log.coxa ? `<span>Coxa: ${log.coxa}cm</span>` : ''}
                  ${log.bf ? `<span>BF: ${log.bf}%</span>` : ''}
                </div>
              </div>
            `).join('')}
          </div>
        </div>

      </div>
    `;
  }

  // --- TAB: CALCULADORA ---
  else if(state.tab === 'calc') {
    const calcResult = state.calc[p];
    html += `
      <h2 style="font-size:18px; margin-bottom:16px;">Calculadora Metabólica</h2>
      ${state.calculando ? `
        <div class="calc-loader">
          <div class="calc-anim-icons">
            <svg class="anim-weight" viewBox="0 0 24 24"><path d="M4 9v6M2 10.5v3M8 6v12M16 6v12M20 10.5v3M22 9v6M8 12h8"/></svg>
            <div class="anim-bottle-container"><div class="anim-bottle-fill"></div></div>
          </div>
          <div>Processando biotipo e calculando macros...</div>
        </div>
      ` : ''}

      <div class="panel">
        <div class="rowGrid">
          <div class="field">
            <label>Peso (kg)</label>
            <input type="number" step="0.1" id="c_peso" value="${calcResult?.peso || ''}">
          </div>
          <div class="field">
            <label>Altura (cm)</label>
            <input type="number" id="c_altura" value="${calcResult?.altura || ''}">
          </div>
        </div>
        <div class="rowGrid">
          <div class="field">
            <label>Idade (anos)</label>
            <input type="number" id="c_idade" value="${calcResult?.idade || ''}">
          </div>
          <div class="field">
            <label>Sexo</label>
            <select id="c_sexo">
              <option value="M" ${calcResult?.sexo === 'M' ? 'selected' : ''}>Masculino</option>
              <option value="F" ${calcResult?.sexo === 'F' ? 'selected' : ''}>Feminino</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label>Nível de Atividade</label>
          <select id="c_atividade">
            <option value="1.2" ${calcResult?.fator == 1.2 ? 'selected' : ''}>Sedentário (Pouco/Sem exercício)</option>
            <option value="1.375" ${calcResult?.fator == 1.375 ? 'selected' : ''}>Moderado (Treina 3-5x/semana)</option>
            <option value="1.55" ${calcResult?.fator == 1.55 ? 'selected' : ''}>Intenso (Treina pesado todo dia)</option>
          </select>
        </div>
        <div class="rowGrid">
          <div class="field">
            <label>Objetivo</label>
            <select id="c_meta">
              <option value="manter" ${calcResult?.meta === 'manter' ? 'selected' : ''}>Manter Peso</option>
              <option value="ganhar" ${calcResult?.meta === 'ganhar' ? 'selected' : ''}>Hipertrofia (Ganhar Massa)</option>
              <option value="perder" ${calcResult?.meta === 'perder' ? 'selected' : ''}>Definição (Perder Gordura)</option>
            </select>
          </div>
          <div class="field">
            <label>Fórmula</label>
            <select id="c_formula" onchange="onFormulaChange()">
              <option value="harris" ${calcResult?.formula === 'harris' ? 'selected' : ''}>Harris-Benedict</option>
              <option value="mifflin" ${calcResult?.formula === 'mifflin' ? 'selected' : ''}>Mifflin-St Jeor</option>
              <option value="katch" ${calcResult?.formula === 'katch' ? 'selected' : ''}>Katch-McArdle (% BF)</option>
            </select>
          </div>
        </div>
        <div class="field" id="gordura_field" style="display: ${calcResult?.formula === 'katch' ? 'block' : 'none'};">
          <label>% de Gordura Corporal</label>
          <input type="number" id="c_gordura" value="${calcResult?.gordura || ''}">
        </div>
        <div class="rowGrid">
          <div class="field">
            <label>Ajuste de Calorias</label>
            <input type="number" id="c_ajuste" value="${calcResult?.ajuste || '300'}">
          </div>
        </div>
        <button class="btn" style="width:100%;" onclick="calcular()">Calcular Macros</button>
      </div>

      ${calcResult && !state.calculando ? `
        <div class="panel animated-fade" style="border-top: 4px solid var(--accent-2);">
          <h3 style="font-size:15px; margin-bottom:12px;">Resultados Calculados</h3>
          <div class="plates">
            <div class="plate accent">
              <div class="val">${calcResult.tmb}</div>
              <div class="lbl">TMB (Kcal)</div>
            </div>
            <div class="plate">
              <div class="val">${calcResult.get}</div>
              <div class="lbl">Gasto Diário</div>
            </div>
            <div class="plate accent2">
              <div class="val">${calcResult.alvo}</div>
              <div class="lbl">Meta Diária</div>
            </div>
          </div>
          <div class="tear"></div>
          <div class="ledger">
            <div class="ledgerRow">
              <div>Proteínas <span class="meta">~2g/kg</span></div>
              <strong style="color:var(--accent-2);">${calcResult.macros?.proteina || 0}g</strong>
            </div>
            <div class="ledgerRow">
              <div>Carboidratos</div>
              <strong style="color:var(--accent-2);">${calcResult.macros?.carboidrato || 0}g</strong>
            </div>
            <div class="ledgerRow">
              <div>Gorduras <span class="meta">~1g/kg</span></div>
              <strong style="color:var(--accent-2);">${calcResult.macros?.gordura || 0}g</strong>
            </div>
          </div>
        </div>
      ` : ''}
    `;
  }

  // --- TAB: MURAL ---
  else if(state.tab === 'mural') {
    html += `
      <h2 style="font-size:18px; margin-bottom:16px;">Mural de Posts e Conquistas</h2>
      <div class="panel composer">
        <textarea id="composer_text" placeholder="Compartilhe o treino de hoje, evolução ou foto motivacional..."></textarea>
        <button class="btn small" onclick="addPost()">Postar</button>
      </div>
      <div id="postsContainer">
        ${state.mural.length === 0 ? '<div class="empty">Nenhuma publicação ainda. Seja o primeiro!</div>' : ''}
        ${state.mural.map(post => `
          <div class="postCard animated-fade">
            <div class="postHead">
              <div class="avatar avatarSmall" style="background:${state.perfis[post.autorId]?.cor || '#777'}">
                ${post.autor[0].toUpperCase()}
              </div>
              <div>
                <div class="who">${post.autor}</div>
                <div class="when">${post.data}</div>
              </div>
            </div>
            <div class="postText">${post.texto}</div>
            <div class="postFoot">
              <button class="likeBtn ${post.curtido ? 'liked' : ''}" onclick="toggleLike('${post.id}')">
                ❤️ ${post.curtidas || 0} Curtidas
              </button>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }

  // --- BOTTOM NAVIGATION BAR ---
  html += `
    </div> <div class="bottomNav">
      <div class="bottomNavInner">
        <button class="navBtn ${state.tab === 'treinos' ? 'active' : ''}" onclick="state.tab = 'treinos'; render();">
          ${ICONS.treinos}
          <span>Treinos</span>
        </button>
        <button class="navBtn ${state.tab === 'progresso' ? 'active' : ''}" onclick="state.tab = 'progresso'; render();">
          ${ICONS.progresso}
          <span>Evolução</span>
        </button>
        <button class="navBtn ${state.tab === 'calc' ? 'active' : ''}" onclick="state.tab = 'calc'; render();">
          ${ICONS.calc}
          <span>Macros</span>
        </button>
        <button class="navBtn ${state.tab === 'mural' ? 'active' : ''}" onclick="state.tab = 'mural'; render();">
          ${ICONS.mural}
          <span>Mural</span>
        </button>
      </div>
    </div>

    <div class="timerBar" id="timerContainer" style="display:none;">
      <div>Tempo de Descanso: <span class="time" id="timerDisplay">00:00</span></div>
      <div class="timerBtnRow">
        <button class="btn small" id="timerPlayBtn" onclick="toggleTimerRun()">PAUSAR</button>
        <button class="btn small ghost" onclick="stopTimer()">OK</button>
      </div>
    </div>

    <div class="menuOverlay ${state.menuOpen ? 'open' : ''}" onclick="state.menuOpen = false; render();"></div>
    <div class="menuPanel ${state.menuOpen ? 'open' : ''}">
      <h3 class="display">Opções Kopple</h3>
      <div class="menuItem" onclick="state.menuOpen = false; render();">Fechar Menu</div>
      <div class="menuItem" onclick="logout()">Trocar Perfil / Sair</div>
      <div class="tear"></div>
      <div class="field">
        <label>Personalizar cor do perfil</label>
        <div class="color-picker-wrap">
          <input type="color" value="${perfilInfo.cor}" onchange="updateColor('${p}', this.value)">
          <span style="font-size:11px;">Mudar paleta</span>
        </div>
      </div>
    </div>
  `;

  root.innerHTML = html;
  updateTimerUI();
}

/* ---------- EVENTOS E MANIPULAÇÃO ---------- */
function toggleEx(treinoId, exId){
  const p = state.perfilAtivo;
  const treino = state.treinos[p].find(t => t.id === treinoId);
  if(treino) {
    const ex = treino.exercicios.find(e => e.id === exId);
    if(ex) {
      ex.feito = !ex.feito;
      safeSet('treinos:'+p, state.treinos[p], true);
      render();
    }
  }
}

function onFormulaChange(){
  const f = document.getElementById('c_formula').value;
  document.getElementById('gordura_field').style.display = (f === 'katch') ? 'block' : 'none';
}

function calcularTMB(formula, peso, altura, idade, sexo, gordura){
  if(formula === 'harris'){
    return sexo === 'M'
      ? 88.362 + 13.397*peso + 4.799*altura - 5.677*idade
      : 447.593 + 9.247*peso + 3.098*altura - 4.330*idade;
  }
  if(formula === 'katch'){
    const mMagra = peso * (1 - (gordura||0)/100);
    return 370 + 21.6 * mMagra;
  }
  return (10*peso) + (6.25*altura) - (5*idade) + (sexo === 'M' ? 5 : -161);
}

function calcular(){
  const peso = parseFloat(document.getElementById('c_peso').value);
  const altura = parseFloat(document.getElementById('c_altura').value);
  const idade = parseInt(document.getElementById('c_idade').value);
  const sexo = document.getElementById('c_sexo').value;
  const fator = parseFloat(document.getElementById('c_atividade').value);
  const meta = document.getElementById('c_meta').value;
  const ajuste = parseInt(document.getElementById('c_ajuste').value) || 0;
  const formula = document.getElementById('c_formula').value;
  const gordura = parseFloat(document.getElementById('c_gordura').value) || 0;
  
  if(!peso || !altura || !idagem){ toast('Preencha peso, altura e idade.'); return; }
  
  state.calculando = true;
  render();

  setTimeout(() => {
    const tmb = calcularTMB(formula, peso, altura, idade, sexo, gordura);
    const get = tmb * fator;
    let alvo = get;
    
    if(meta === 'ganhar') alvo = get + ajuste;
    if(meta === 'perder') alvo = get - ajuste;
    
    // Cálculo sugerido de Macronutrientes para musculação
    const protG = Math.round(peso * 2);
    const gordG = Math.round(peso * 1);
    const calRestantes = alvo - (protG * 4) - (gordG * 9);
    const carbG = Math.max(0, Math.round(calRestantes / 4));

    const result = { 
      peso, altura, idade, sexo, fator, meta, ajuste, formula, gordura,
      tmb: Math.round(tmb), 
      get: Math.round(get),
      alvo: Math.round(alvo),
      macros: { proteina: protG, carboidrato: carbG, gordura: gordG }
    };

    const p = state.perfilAtivo;
    state.calc[p] = result;
    state.calculando = false;

    safeSet('calc:' + p, result, true);
    toast('Macros calculados com sucesso! 📊');
    render();
  }, 1200);
}

/* ---------- MURAL ACTIONS ---------- */
function addPost(){
  const input = document.getElementById('composer_text');
  const txt = input.value.trim();
  if(!txt) return;
  const p = state.perfilAtivo;
  const perfil = state.perfis[p];
  
  const novoPost = {
    id: Date.now().toString(36),
    autor: perfil.nome,
    autorId: p,
    texto: txt,
    data: new Date().toLocaleString('pt-BR'),
    curtidas: 0,
    curtido: false
  };
  
  state.mural.unshift(novoPost);
  safeSet('mural', state.mural, true);
  input.value = '';
  render();
}

function toggleLike(id){
  const post = state.mural.find(p => p.id === id);
  if(post) {
    post.curtido = !post.curtido;
    post.curtidas = post.curtido ? post.curtidas + 1 : post.curtidas - 1;
    safeSet('mural', state.mural, true);
    render();
  }
}

// Inicia tudo ao abrir a página
loadAll();
</script>
